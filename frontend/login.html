<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyShip — Login</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
      </div>
      <h1>EasyShip</h1>
      <div class="sub">Shipping label management</div>
      <div class="login-error" id="login-error"></div>
      <form id="login-form">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign in</button>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>

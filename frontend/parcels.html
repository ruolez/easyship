<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyShip — Parcels</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header id="appbar"></header>
  <div class="container wide">
    <div class="page-head"><h1>Parcels</h1><span class="sub">Every label, who created it, and where the tracking went</span></div>
    <div class="card">
      <div class="table-wrap">
        <table class="striped compact">
          <thead>
            <tr>
              <th class="sortable" data-sort="ref">Order #</th>
              <th class="sortable" data-sort="user">User</th>
              <th class="sortable" data-sort="store">Store</th>
              <th class="sortable" data-sort="address">Address</th>
              <th class="num sortable" data-sort="boxes">Boxes</th>
              <th class="num sortable" data-sort="weight">Weight</th>
              <th class="sortable" data-sort="courier">Service</th>
              <th class="sortable" data-sort="carrier">Carrier</th>
              <th class="num sortable" data-sort="cost">Cost</th>
              <th class="sortable" data-sort="tracking">Tracking</th>
              <th class="sortable" data-sort="status">Status</th>
              <th class="sortable" data-sort="shipped">Shipped</th>
              <th class="sortable" data-sort="created">Created (CT)</th>
              <th></th>
            </tr>
            <tr class="filter-row">
              <th><input type="text" id="search" placeholder="Search…" title="Search order #, tracking, customer, city" style="min-width:90px"></th>
              <th><select id="user-filter"><option value="">All</option></select></th>
              <th><select id="store-filter"><option value="">All</option></select></th>
              <th></th>
              <th></th>
              <th></th>
              <th><select id="service-filter"><option value="">All</option></select></th>
              <th><select id="carrier-filter"><option value="">All</option></select></th>
              <th></th>
              <th></th>
              <th>
                <select id="status-filter">
                  <option value="">All</option>
                  <option value="fulfilled">Fulfilled</option>
                  <option value="label_created">Label created</option>
                  <option value="rated">Rated (no label)</option>
                  <option value="draft">Draft</option>
                  <option value="voided">Voided</option>
                  <option value="error">Error</option>
                </select>
              </th>
              <th></th>
              <th>
                <div class="dates">
                  <input type="date" id="date-from" title="Created from">
                  <input type="date" id="date-to" title="Created to">
                </div>
              </th>
              <th><button class="btn btn-outlined btn-small" id="refresh">Refresh</button></th>
            </tr>
          </thead>
          <tbody id="parcels-body"></tbody>
        </table>
      </div>
      <div class="empty" id="empty" style="display:none"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/browserprint.js"></script>
  <script src="/js/parcels.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyShip — Parcels</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header id="appbar"></header>
  <div class="container wide">
    <div class="page-head"><h1>Parcels</h1><span class="sub">Every label, who created it, and where the tracking went</span></div>
    <div class="card">
      <div class="row mb-16">
        <div class="field">
          <label>Search (order #, tracking, customer, city)</label>
          <input type="text" id="search" placeholder="Search…">
        </div>
        <div class="field fixed" style="min-width:140px">
          <label>User</label>
          <select id="user-filter"><option value="">All</option></select>
        </div>
        <div class="field fixed" style="min-width:150px">
          <label>Status</label>
          <select id="status-filter">
            <option value="">All</option>
            <option value="fulfilled">Fulfilled</option>
            <option value="label_created">Label created</option>
            <option value="rated">Rated (no label)</option>
            <option value="draft">Draft</option>
            <option value="voided">Voided</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div class="field fixed" style="min-width:150px">
          <label>From</label>
          <input type="date" id="date-from">
        </div>
        <div class="field fixed" style="min-width:150px">
          <label>To</label>
          <input type="date" id="date-to">
        </div>
        <div class="fixed"><button class="btn btn-outlined btn-small" id="refresh">Refresh</button></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order #</th><th>User</th><th>Service</th><th>Address</th><th class="num">Weight</th>
              <th>Shipping Service</th><th>Carrier</th><th class="num">Cost</th><th>Tracking Number</th>
              <th>Status</th><th>Shipping Date</th><th>Created (CT)</th><th></th>
            </tr>
          </thead>
          <tbody id="parcels-body"></tbody>
        </table>
      </div>
      <div class="empty" id="empty" style="display:none"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal"></div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/parcels.js"></script>
</body>
</html>

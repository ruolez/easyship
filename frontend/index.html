<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyShip — Scan</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header id="appbar"></header>
  <div class="container narrow">
    <div class="card" style="max-width:640px;margin:48px auto 16px">
      <h2>📦 Ship an order</h2>
      <div class="field mb-16">
        <label>Store / Database</label>
        <select id="source-select" style="font-size:16px;padding:14px"></select>
      </div>
      <div class="field mb-16">
        <label>Order / Invoice number — scan or type, then Enter</label>
        <input id="order-number" autocomplete="off"
               style="font-size:22px;padding:16px;letter-spacing:1px" placeholder="Scan order…">
      </div>
      <div class="row">
        <div class="fixed"><button class="btn btn-primary" id="lookup-btn">Look up order</button></div>
        <div class="fixed" id="lookup-status"></div>
      </div>
    </div>
    <div style="max-width:640px;margin:0 auto" class="text-secondary">
      Browse open orders instead on the <a href="/orders.html">Orders</a> page,
      or create a <a href="/ship.html?source=manual">manual shipment</a>.
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/scan.js"></script>
</body>
</html>

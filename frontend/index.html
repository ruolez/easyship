<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyShip — Scan</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header id="appbar"></header>
  <div class="container">
    <div class="scan-hero">
      <div class="card">
        <h2>Ship an order</h2>
        <div class="field mb-16">
          <label>Store / Database</label>
          <select id="source-select"></select>
        </div>
        <div class="field mb-16">
          <label>Order / Invoice number <span class="hint">— scan or type, then <kbd>Enter</kbd></span></label>
          <input id="order-number" autocomplete="off" placeholder="Scan order…">
        </div>
        <div class="row">
          <div class="fixed"><button class="btn btn-primary" id="lookup-btn">Look up order</button></div>
          <div class="fixed" id="lookup-status"></div>
        </div>
      </div>
    </div>
    <div class="scan-links">
      Browse open orders on the <a href="/orders.html">Orders</a> page,
      or create a <a href="/ship.html?source=manual">manual shipment</a>.
    </div>
  </div>
  <div class="modal-backdrop" id="modal-backdrop"><div class="modal" id="modal"></div></div>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/scan.js"></script>
</body>
</html>

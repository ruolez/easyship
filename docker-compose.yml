services:
  nginx:
    image: nginx:alpine
    container_name: easyship-nginx
    ports:
      - "${APP_PORT:-5557}:80"
      - "${APP_HTTPS_PORT:-5558}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: easyship-backend
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=easyship
      - POSTGRES_USER=easyship
    volumes:
      - ./backend:/app
      - labels:/data/labels
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: easyship-postgres
    environment:
      - POSTGRES_DB=easyship
      - POSTGRES_USER=easyship
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyship -d easyship"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  labels:

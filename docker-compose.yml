# Production compose. Tuned for a 2 vCPU / 4 GiB host.
# Per-container memory limits guarantee no single service can OOM the VM;
# reservations keep the scheduler honest. Log rotation caps disk growth.
# For local development with live-reload, add the dev overlay:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    container_name: easyship-nginx
    ports:
      - "${APP_PORT:-5557}:80"
      - "${APP_HTTPS_PORT:-5558}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          # Overridden by install.sh, which scales limits to the host's RAM.
          memory: ${NGINX_MEM_LIMIT:-128M}
        reservations:
          memory: 16M

  backend:
    build: ./backend
    container_name: easyship-backend
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=easyship
      - POSTGRES_USER=easyship
      # Tune workers to the box; 2 workers x 4 threads fits 2 vCPU comfortably.
      - GUNICORN_WORKERS=2
      - GUNICORN_THREADS=4
      - GUNICORN_MAX_REQUESTS=500
      - GUNICORN_MAX_REQUESTS_JITTER=50
    volumes:
      # Code is baked into the image in production — only persistent data is mounted.
      - labels:/data/labels
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: ${BACKEND_MEM_LIMIT:-1024M}
        reservations:
          memory: 128M

  postgres:
    image: postgres:16-alpine
    container_name: easyship-postgres
    environment:
      - POSTGRES_DB=easyship
      - POSTGRES_USER=easyship
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # Sized for a small shared host — bounds Postgres memory instead of letting
    # it assume it owns the machine. max_connections comfortably covers
    # workers x threads (8) plus headroom.
    command:
      - postgres
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE:-768MB}"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easyship -d easyship"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: ${POSTGRES_MEM_LIMIT:-1024M}
        reservations:
          memory: 128M

volumes:
  pgdata:
  labels:
